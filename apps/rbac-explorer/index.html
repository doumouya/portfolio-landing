<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>rbac-explorer</title><style>:root {
  --bg: #ffffff; --fg: #1f2937; --muted: #6b7280; --line: #e5e7eb;
  --accent: #2563eb; --head: #f9fafb; --ok: #16a34a;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #0f172a; --fg: #e5e7eb; --muted: #94a3b8; --line: #1e293b;
          --accent: #60a5fa; --head: #111827; --ok: #4ade80; }
}
* { box-sizing: border-box; }
body { margin: 0; font: 0.875rem/1.5 system-ui, sans-serif; color: var(--fg); background: var(--bg); }
header { display: flex; gap: 0.75rem; align-items: center; padding: 0.75rem 1rem;
         border-bottom: 1px solid var(--line); }
header h1 { font-size: 1rem; margin: 0; }
.muted { color: var(--muted); font-size: 0.8rem; }
.spacer { flex: 1; }
select { font: inherit; padding: 0.3rem 0.4rem; border: 1px solid var(--line);
         border-radius: 0.4rem; background: var(--bg); color: var(--fg); }
.legend { display: flex; gap: 1rem; flex-wrap: wrap; padding: 0.6rem 1rem; font-size: 0.8rem;
          color: var(--muted); border-bottom: 1px solid var(--line); }
.legend b { color: var(--fg); }
main { display: grid; grid-template-columns: 1fr 18rem; gap: 1rem; padding: 1rem; align-items: start; }
@media (max-width: 40rem) { main { grid-template-columns: 1fr; } }

#tree .children { margin-left: 1.4rem; border-left: 1px dashed var(--line); padding-left: 1rem; }
.node { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
        border: 1px solid var(--line); border-radius: 0.5rem; padding: 0.4rem 0.6rem; margin: 0.35rem 0;
        cursor: pointer; background: var(--head); transition: opacity 0.15s, border-color 0.15s, background 0.15s; }
.node:hover { border-color: var(--accent); }
.node.dim { opacity: 0.4; }
.node.reached { border-color: var(--ok); background: color-mix(in srgb, var(--ok) 14%, var(--head)); }
.node.member { box-shadow: inset 0 0 0 2px var(--accent); }
.nlabel { font-weight: 600; }
.kind { font-weight: 400; color: var(--muted); font-size: 0.72rem; margin-left: 0.35rem; }
.badges { display: flex; gap: 0.2rem; }
.badge { display: inline-grid; place-items: center; width: 1.35rem; height: 1.35rem; border-radius: 50%;
         background: var(--line); color: var(--fg); font-size: 0.7rem; font-weight: 600; }
.badge.me { background: var(--accent); color: #fff; }
#panel { border: 1px solid var(--line); border-radius: 0.6rem; padding: 0.8rem; background: var(--head);
         position: sticky; top: 1rem; }
#panel p { margin: 0 0 0.6rem; }
#panel .big { font-size: 1.6rem; font-weight: 700; color: var(--ok); }
</style></head><body><header>
  <h1>rbac-explorer</h1>
  <span class="muted">scoped-ownership access, resolved in your browser</span>
  <span class="spacer"></span>
  <label>Actor&nbsp;<select id="actor"></select></label>
</header>
<div class="legend">
  <span><b style="color:var(--ok)">●</b> reachable</span>
  <span><b style="box-shadow:inset 0 0 0 2px var(--accent);padding:0 .35rem;border-radius:.3rem">▢</b> direct membership</span>
  <span><b style="opacity:.4">●</b> no access</span>
  <span>Membership grants the node <b>and everything beneath it</b> — never the parent.</span>
  <span>Click any node to grant / revoke the selected actor's membership.</span>
</div>
<main>
  <section id="tree"></section>
  <aside id="panel"></aside>
</main>

// and the nodes they can reach light up. Click a node to grant/revoke that actor's membership and
// watch reach recompute. The reach itself is computed by the wasm engine (`WasmGraph.reachable`);
// this file only renders and edits the membership state. `wasm_bindgen` + `WASM_B64` are defined above.

const NODES = [
  { id: "acme", label: "Acme Corp", kind: "Company", parent: "" },
  { id: "eng", label: "Engineering", kind: "Department", parent: "acme" },
  { id: "apollo", label: "Project Apollo", kind: "Project", parent: "eng" },
  { id: "zephyr", label: "Project Zephyr", kind: "Project", parent: "eng" },
  { id: "sales", label: "Sales", kind: "Department", parent: "acme" },
  { id: "eu", label: "Region EU", kind: "Team", parent: "sales" },
  { id: "us", label: "Region US", kind: "Team", parent: "sales" },
];
const ACTORS = ["Alice", "Bob", "Carol", "Dave", "Erin"];
const memberships = {
  Alice: new Set(["acme"]),   // company-wide
  Bob: new Set(["eng"]),      // engineering
  Carol: new Set(["apollo"]), // one project
  Dave: new Set(["sales"]),   // sales
  Erin: new Set([]),          // none
};

let WasmGraph, graph, actor = "Bob";
const $ = (s) => document.querySelector(s);

function b64ToBytes(b64) {
  const s = atob(b64);
  const u = new Uint8Array(s.length);
  for (let i = 0; i < s.length; i++) u[i] = s.charCodeAt(i);
  return u;
}
function esc(s) {
  return String(s).replace(/[&<>"]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
}
const label = (id) => esc((NODES.find((n) => n.id === id) || {}).label || id);
const childrenOf = (pid) => NODES.filter((n) => n.parent === pid);
const membersAt = (id) => ACTORS.filter((a) => memberships[a].has(id));

function nodeHtml(n, reach) {
  const isMember = memberships[actor].has(n.id);
  const reached = reach.has(n.id);
  const badges = membersAt(n.id).map((a) => `<span class="badge${a === actor ? " me" : ""}" title="${a}">${a[0]}</span>`).join("");
  const kids = childrenOf(n.id);
  return (
    `<div class="node ${reached ? "reached" : "dim"}${isMember ? " member" : ""}" data-id="${n.id}" ` +
    `title="click to ${isMember ? "revoke" : "grant"} ${actor}'s membership here">` +
    `<span class="nlabel">${esc(n.label)}<span class="kind">${n.kind}</span></span>` +
    `<span class="badges">${badges}</span></div>` +
    (kids.length ? `<div class="children">${kids.map((k) => nodeHtml(k, reach)).join("")}</div>` : "")
  );
}

function render() {
  const reach = new Set(graph.reachable([...memberships[actor]]));
  $("#tree").innerHTML = NODES.filter((n) => !n.parent).map((n) => nodeHtml(n, reach)).join("");

  const memberOf = [...memberships[actor]];
  const reachable = NODES.filter((n) => reach.has(n.id));
  $("#panel").innerHTML =
    `<p class="big">${reachable.length}<span style="font-size:.9rem;color:var(--muted)"> / ${NODES.length} reachable</span></p>` +
    `<p><b>${actor}</b> is a member of:<br>${memberOf.map(label).join(", ") || "<i>nothing</i>"}</p>` +
    `<p>Reaches:<br>${reachable.map((n) => label(n.id)).join(", ") || "<i>nothing</i>"}</p>`;

  $("#tree").querySelectorAll(".node").forEach((el) => {
    el.onclick = () => {
      const set = memberships[actor];
      set.has(el.dataset.id) ? set.delete(el.dataset.id) : set.add(el.dataset.id);
      render();
    };
  });
}

window.addEventListener("DOMContentLoaded", async () => {
  await wasm_bindgen(b64ToBytes(WASM_B64));
  WasmGraph = wasm_bindgen.WasmGraph;
  graph = new WasmGraph(NODES.map((n) => n.id), NODES.map((n) => n.parent));

  const sel = $("#actor");
  sel.innerHTML = ACTORS.map((a) => `<option${a === actor ? " selected" : ""}>${a}</option>`).join("");
  sel.onchange = () => { actor = sel.value; render(); };
  render();
});
</script></body></html>
