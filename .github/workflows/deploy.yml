name: deploy

# The landing + app demos are committed pre-built, so CI only typechecks the source
# and deploys the static site to GitHub Pages. (Rebuilding needs the sibling repos,
# which live in their own repositories — see tools/build.sh.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck the landing source
        run: npm run typecheck
      - name: Stage the site (landing + app demos)
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp -r apps _site/apps
      # enablement:true turns Pages on automatically (via the pages:write token) so a fresh
      # repo deploys on the first run without anyone toggling Settings → Pages by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
